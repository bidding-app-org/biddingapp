name: SonarCloud Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Run Lint (optional skip pannalam if error varum)
      - name: Run Lint
        run: npm run lint --if-present

      # 5. Run Tests (important for green tick)
      - name: Run Tests
        run: npm test -- --watchAll=false --passWithNoTests

      # 6. Build project
      - name: Build Project
        run: npm run build
